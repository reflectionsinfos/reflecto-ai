#/etc/nginx/conf.d/reflecto-prod-app.conf

# Preserve upstream TLS info from a load balancer if present
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;  # e.g., "https" from ELB/ALB/Cloudflare
    ""      $scheme;                 # fallback to Nginx scheme
}

server {
    listen 80;
    server_name reflecto-ai.onreflections.com;

    # Allow MSAL popup to close/communicate with opener
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

    # Frontend Proxy (Next.js App)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # API Proxy (Node.js Backend)
    location /api/ {
	    # Handle CORS preflight if needed (Next.js might handle it, but good to have)
	    if ($request_method = OPTIONS) {
	        add_header Access-Control-Allow-Origin $http_origin always;
	        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
	        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
	        add_header Access-Control-Allow-Credentials true always;
	        add_header Access-Control-Max-Age 86400 always;
	        return 204;
	    }

	    # Proxy API to Backend
	    proxy_pass http://127.0.0.1:4000;
	    proxy_http_version 1.1;
		
	    proxy_set_header Host $host;
	    proxy_set_header X-Real-IP $remote_addr;
	    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	    proxy_set_header X-Forwarded-Proto $forwarded_proto;
	    proxy_set_header X-Forwarded-Port 443;        
	    proxy_set_header X-Forwarded-Host $host;
	    proxy_set_header Authorization $http_authorization;
	    proxy_set_header Connection "";

	    proxy_read_timeout 300;
	    proxy_send_timeout 300;
	    proxy_redirect off;
	    proxy_intercept_errors off;
    }

    # Optional: Increase body size for image uploads
    client_max_body_size 20m;
}
