services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: reflecto-backend-prod
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=4000
      # Use host.docker.internal to access the DB on the host machine (192.168.117.114)
      - DATABASE_URL=postgresql://samiksha_user:Samiksha%407896@host.docker.internal:5432/samiksha_prod?schema=reflecto-ai
    restart: always

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: reflecto-frontend-prod
    ports:
      - "3000:3000"
    env_file:
      - ./apps/frontend/.env.production
    depends_on:
      - backend
    restart: always
