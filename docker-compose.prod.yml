services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - PORT=4000
      # Use host.docker.internal to access the DB on the host machine (192.168.117.114)
      - DATABASE_URL=postgresql://samiksha_user:Samiksha%407896@host.docker.internal:5432/samiksha_prod?schema=reflecto-ai-2
    restart: always

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    ports:
      - "3000:3000"
    env_file:
      - ./apps/frontend/.env.production
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - backend
    restart: always
